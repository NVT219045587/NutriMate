worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    image/svg+xml;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name _;

        # ── React SPA ──────────────────────────────────────────────────────
        root  /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── API reverse-proxy ──────────────────────────────────────────────
        # All /api/* requests are forwarded to the nutrimate-api container.
        # The browser sees a single origin so no CORS headers are required.
        location /api/ {
            proxy_pass         http://nutrimate-api:8080;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Forward cookies and custom headers intact
            proxy_pass_header  Set-Cookie;
            proxy_set_header   X-Csrf-Token      $http_x_csrf_token;

            proxy_read_timeout 60s;
        }
    }
}
